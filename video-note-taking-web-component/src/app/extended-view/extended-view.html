@if (isExtendedView) {
    <div class="extended-view">
        <div class="control-div">
            <div class="thumbnail-div">
                <img [src]="entry.thumbnail" [alt]="entry.title" class="thumbnail">
            </div>
            <div class="data-div">
                <h4 class="title" [title]="entry.title">{{ entry.title }}</h4>
                <p (click)="jumpToTimestamp()" class="timestamp">
                    {{ entry.timestamp }}
                </p>
                <button (click)="deleteEntry()" class="delete">Delete Entry</button>
                <button (click)="editEntry()" class="edit">Edit Entry</button>

                @if (showModal) {
                    <confirm-delete-element
                        (confirm)="confirmDelete()"
                        (cancel)="cancelDelete()">
                    </confirm-delete-element>
                }
            </div>
        </div>
        <div class="note-div">
            <p class="note">{{ entry.note }}</p>
        </div>
        <button (click)="close()" class="up-button">
            <img src="chevron-up.svg" alt="Close Extended View" class="up">
        </button>
    </div>
}
