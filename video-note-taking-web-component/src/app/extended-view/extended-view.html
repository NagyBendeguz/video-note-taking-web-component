@if (isExtendedView) {
    <div>
        <div>
            <div>
                <img [src]="entry.thumbnail" [alt]="entry.title">
            </div>
            <div>
                <h4>{{ entry.title }}</h4>
                <p (click)="jumpToTimestamp()">
                    {{ entry.timestamp }}
                </p>
                <button (click)="editEntry()">Edit</button>
                <button (click)="deleteEntry()">Delete</button>
            </div>
        </div>
        <div>
            <p>{{ entry.note }}</p>
        </div>
        <button (click)="closeExtendedView()" class="up-button">
            <img src="chevron-up.svg" alt="Close Extended View" class="up">
        </button>
    </div>
}
@else {
    <compressed-view-element
        [entry]="entry"
        [isExtendedView]="isExtendedView">
    </compressed-view-element>
}
