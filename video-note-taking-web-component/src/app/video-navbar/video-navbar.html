<nav [ngClass]="{
    'full-width': !(isSettings$ | async) || !(isNote$ | async),
    'half-width': (isSettings$ | async) || (isNote$ | async)
    }">
    <ul class="video-navbar">
        <li>
            <button (click)="onTogglePlay()">
                <i class="bi bi-caret-right" [ngClass]="{'hidden': isPlaying$ | async}"></i>
                <i class="bi bi-pause" [ngClass]="{'hidden': !(isPlaying$ | async)}"></i>
            </button>
        </li>
        <li>
            <button (click)="onRewind()">
                <i class="bi bi-rewind"></i>
            </button>
        </li>
        <li>
            <button (click)="onForward()">
                <i class="bi bi-fast-forward"></i>
            </button>
        </li>
        <li>
            @if ((volumePercentage$ | async) === 0)
            {
                <button (click)="unMute()">
                    <i class="bi bi-volume-mute"></i>
                </button>
            }
            @else
            {
                <button (click)="mute()">
                    <i class="bi bi-volume-off" [ngClass]="{'hidden': !((volumePercentage$ | async)! > 0 && (volumePercentage$ | async)! < 33)}"></i>
                    <i class="bi bi-volume-down" [ngClass]="{'hidden': !((volumePercentage$ | async)! >= 33 && (volumePercentage$ | async)! <= 66)}"></i>
                    <i class="bi bi-volume-up" [ngClass]="{'hidden': !((volumePercentage$ | async)! > 66)}"></i>
                </button>
            }
            <input type="range" min="0" max="100" [value]="(volumePercentage$ | async)" (input)="setVolume($event.target.value)">
        </li>
        <li class="progress-item">
            <progress id="progress" [max]="(duration$ | async)" [value]="(currentTime$ | async)" (click)="setCurrentTimeByClick($event)"></progress>
        </li>
        <li>
            <button (click)="setNote()">
                <i class="bi bi-journals"></i>
            </button>
        </li>
        <li>
            <button (click)="setSettings()">
                <i class="bi bi-gear"></i>
            </button>
        </li>
        <li>
            <button (click)="setFullscreen()">
                <i class="bi bi-arrows-fullscreen" [ngClass]="{'hidden': fullscreenRequest$ | async}"></i>
                <i class="bi bi-fullscreen-exit" [ngClass]="{'hidden': !(fullscreenRequest$ | async)}"></i>
            </button>
        </li>
    </ul>
</nav>
