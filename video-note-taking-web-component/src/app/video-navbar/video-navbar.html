<ul class="video-navbar">
    <li>
        <button (click)="onTogglePlay()" class="btn play-pause">
            <img src="play.svg" alt="Play" [ngClass]="{'hidden': isPlaying}">
            <img src="pause.svg" alt="Pause" [ngClass]="{'hidden': !isPlaying}">
        </button>
    </li>
    <li>
        <button (click)="onRewind()" class="btn rewind">
            <img src="rewind.svg" alt="Rewind">
        </button>
    </li>
    <li>
        <button (click)="onForward()" class="btn forward">
            <img src="forward.svg" alt="Forward">
        </button>
    </li>
    <li>
        @if (volumePercentage === 0)
        {
            <button (click)="unMute()" class="btn volume">
                <img src="volume-1.svg" alt="Mute Volume">
            </button>
        }
        @else
        {
            <button (click)="mute()" class="btn volume">
                <img src="volume-1.svg" alt="Mute Volume" [ngClass]="{'hidden': !(volumePercentage === 0)}"><!--Csak azért van itt, hogy az ikon betöltődjön és ne legyen egy pillanatnyi villódzás.-->
                <img src="volume-2.svg" alt="Low Volume" [ngClass]="{'hidden': !(volumePercentage > 0 && volumePercentage < 33)}">
                <img src="volume-3.svg" alt="Medium Volume" [ngClass]="{'hidden': !(volumePercentage >= 33 && volumePercentage <= 66)}">
                <img src="volume-4.svg" alt="High Volume" [ngClass]="{'hidden': !(volumePercentage > 66)}">
            </button>
        }
        <input type="range" min="0" max="100" [value]="volumePercentage" (input)="setVolume($event.target.value)">
    </li>
    <li class="progress-item">
        <progress id="progress" [max]="duration" [value]="currentTime" (click)="setCurrentTime($event)"></progress>
    </li>
    <li>
        <button (click)="onNote()" class="btn note">
            <img src="note.svg" alt="Note">
        </button>
    </li>
    <li>
        <button (click)="onSettings()" class="btn settings">
            <img src="settings.svg" alt="Settings">
        </button>
    </li>
    <li>
        <button (click)="setFullscreen()" class="btn fullscreen">
            <img src="fullscreen-on.svg" alt="Fullscreen On" [ngClass]="{'hidden': fullscreenRequest}">
            <img src="fullscreen-off.svg" alt="Fullscreen Off" [ngClass]="{'hidden': !fullscreenRequest}">
        </button>
    </li>
</ul>
