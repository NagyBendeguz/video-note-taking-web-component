<div class="video-player" #videoPlayer>
    <video #videoElement>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <video-navbar-element
        (togglePlay)="togglePlay()" 
        (rewind)="rewind()" 
        (forward)="forward()">
    </video-navbar-element>
    <video-settings-element
        [ngClass]="{'hidden': !isSettings}">
    </video-settings-element>
</div>
