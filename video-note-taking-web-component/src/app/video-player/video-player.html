<div class="video-player" #videoPlayer>
    <div class="video-outer-div" [ngClass]="{'open-page video-outer-div-open-page': (isSettings$ | async) || (isNote$ | async)}">
        <div (click)="togglePlay()" class="video-div">
            <video (loadedmetadata)="onVideoMetadataLoaded($event)" (timeupdate)="setCurrentTime()" #videoElement>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
    <canvas id="canvas" class="hidden" #canvasElement></canvas>
    <video-navbar-element
        (togglePlay)="togglePlay()" 
        (rewind)="rewind()" 
        (forward)="forward()">
    </video-navbar-element>
    <video-note-element
        [ngClass]="{'hidden': !(isNote$ | async)}">
    </video-note-element>
    <video-settings-element
        [ngClass]="{'hidden': !(isSettings$ | async)}">
    </video-settings-element>
</div>
