<div class="video-player" #videoPlayerDiv>
    <div class="video-outer-div" [ngClass]="{'open-page video-outer-div-open-page': (isSettings$ | async) || (isNote$ | async)}">
        <div (click)="togglePlay()" class="video-div">
            <video (loadedmetadata)="onVideoMetadataLoaded()" (timeupdate)="setCurrentTime()" #videoElement>
                <source [src]="src$ | async" type="video/mp4">
                <track [src]="subtitle$ | async" kind="subtitles" [srclang]="lang$ | async" [label]="label$ | async" #subtitlesTrack>
                {{ 'PLAYER.SUPPORT' | translate }}
            </video>
        </div>
    </div>
    <canvas id="canvas" class="hidden" #canvasElement></canvas>
    <video-navbar></video-navbar>
    <video-note
        [ngClass]="{'hidden': !(isNote$ | async)}">
    </video-note>
    <video-settings
        [ngClass]="{'hidden': !(isSettings$ | async)}">
    </video-settings>
</div>
