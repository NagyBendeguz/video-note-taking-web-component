<div class="note-div">
    <div class="note-view">
        @for (currentEntry of arrayEntry$ | async; track $index; let idx = $index;)
        {
            <compressed-view
                [entry]="currentEntry"
                [isExtendedView]="isExtendedViews.get(currentEntry.entryId + '') || false"
                (onToggle)="toggleView(currentEntry.entryId + '')"
                [ngClass]="'element-' + idx"
                [formattedNote]="currentEntry.formattedNote">
            </compressed-view>
        }
    </div>
    <editing-view></editing-view>
</div>
