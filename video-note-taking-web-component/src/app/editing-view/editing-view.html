<div class="editing-view">
    <div class="data">
        <div class="thumbnail-div">
            <img [src]="(entry$ | async)?.thumbnail" [alt]="(entry$ | async)?.title" class="thumbnail">
        </div>
        <div class="time">
            <button (click)="editingRewind()">
                <i class="bi bi-chevron-double-left"></i>
            </button>
            <span>{{ (entry$ | async)?.timestamp }}</span>
            <button (click)="editingForward()">
                <i class="bi bi-chevron-double-right"></i>
            </button>
        </div>
        <div class="title">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" placeholder="Title" [value]="(entry$ | async)?.title" (input)="addTitle($event)" required>
        </div>
        <div class="save-cancel">
            <button (click)="cancelEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="cancel">Cancel Entry</button>
            <button (click)="saveEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="save">Save Entry</button>
        </div>
    </div>
    <div class="note">
        <div class="edit-note">
            <div class="style-buttons">
                <button (click)="bold()">
                    <i class="bi bi-type-bold"></i>
                </button>
                <button (click)="italic()">
                    <i class="bi bi-type-italic"></i>
                </button>
                <button (click)="underline()">
                    <i class="bi bi-type-underline"></i>
                </button>
                <button (click)="strikethrough()">
                    <i class="bi bi-type-strikethrough"></i>
                </button>
                <button (click)="orderedList()">
                    <i class="bi bi-list-ol"></i>
                </button>
                <button (click)="unorderedList()">
                    <i class="bi bi-list-ul"></i>
                </button>
                <button (click)="table()">
                    <i class="bi bi-table"></i>
                </button>
            </div>
            <div>
                <button (click)="saveNote()" class="save">Save Note</button>
                <button (click)="exportNote()" class="export">Export Note</button>
            </div>
        </div>
        <div class="type-note">
            <textarea name="note" id="note" [value]="(entry$ | async)?.note" (input)="addNote($event)" placeholder="Note" required></textarea>
        </div>
    </div>
</div>
