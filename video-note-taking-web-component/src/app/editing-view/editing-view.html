<div class="editing-view">
    <div class="data">
        <div class="thumbnail-div">
            <img [src]="(entry$ | async)?.thumbnail" [alt]="(entry$ | async)?.title" class="thumbnail">
        </div>
        <div class="time">
            <button (click)="editingRewind()">
                <img src="chevron-double-left.svg" alt="Rewind">
            </button>
            <span>{{ (entry$ | async)?.timestamp }}</span>
            <button (click)="editingForward()">
                <img src="chevron-double-right.svg" alt="Forward">
            </button>
        </div>
        <div class="title">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" placeholder="Title" [value]="(entry$ | async)?.title" (input)="addTitle($event)" required>
        </div>
        <div class="save-cancel">
            <button (click)="cancelEntry()" class="cancel">Cancel Entry</button>
            <button (click)="saveEntry()" class="save">Save Entry</button>
        </div>
    </div>
    <div class="note">
        <div class="edit-note">
            <div class="style-buttons">
                <button (click)="bold()">
                    <img src="bold.svg" alt="Bold" title="Bold">
                </button>
                <button (click)="italic()">
                    <img src="italic.svg" alt="Italic" title="Italic">
                </button>
                <button (click)="underline()">
                    <img src="underline.svg" alt="Underline" title="Underline">
                </button>
                <button (click)="strikethrough()">
                    <img src="strikethrough.svg" alt="Strikethrough" title="Strikethrough">
                </button>
                <button (click)="orderedList()">
                    <img src="ordered-list.svg" alt="Ordered List" title="Ordered List">
                </button>
                <button (click)="unorderedList()">
                    <img src="unordered-list.svg" alt="Unordered List" title="Unordered List">
                </button>
                <button (click)="table()">
                    <img src="table.svg" alt="Table" title="Table">
                </button>
            </div>
            <div>
                <button (click)="saveNote()" class="save">Save Note</button>
                <button (click)="exportNote()" class="export">Export Note</button>
            </div>
        </div>
        <div class="type-note">
            <textarea name="note" id="note" [value]="(entry$ | async)?.note" (input)="addNote($event)" placeholder="Note" required></textarea>
        </div>
    </div>
</div>
