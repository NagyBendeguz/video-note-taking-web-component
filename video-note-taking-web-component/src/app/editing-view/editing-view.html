<div class="editing-view">
    <div class="data">
        <div class="thumbnail-div">
            <img [src]="(entry$ | async)?.thumbnail" [alt]="(entry$ | async)?.title" class="thumbnail">
        </div>
        <div class="time">
            <button (click)="editingRewind()">
                <i class="bi bi-chevron-double-left"></i>
            </button>
            <span>{{ (entry$ | async)?.timestamp }}</span>
            <button (click)="editingForward()">
                <i class="bi bi-chevron-double-right"></i>
            </button>
        </div>
        <div class="title">
            <label for="title">{{ 'EDIT.TITLE' | translate }}</label>
            <input type="text" name="title" id="title" placeholder="{{ 'EDIT.TITLE' | translate }}" [value]="(entry$ | async)?.title" (input)="addTitle($event)" maxlength="50" required>
        </div>
        <div class="save-cancel">
            <button (click)="cancelEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="cancel">
                {{ 'BUTTON.CANCEL' | translate }}
            </button>
            <button (click)="saveEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="save">
                {{ 'EDIT.SAVE' | translate }}
            </button>
            @if (showModal)
            {
                <confirm-message
                    [message]="'EDIT.CONFIRM_MESSAGE_MESSAGE' | translate"
                    [type]="'EDIT.CONFIRM_MESSAGE_TYPE' | translate"
                    (confirm)="confirmCancel()"
                    (cancel)="cancelCancel()">
                </confirm-message>
            }
        </div>
    </div>
    <div class="note">
        <div class="edit-note">
            <div class="style-buttons">
                <button (click)="bold()">
                    <i class="bi bi-type-bold"></i>
                </button>
                <button (click)="italic()">
                    <i class="bi bi-type-italic"></i>
                </button>
                <button (click)="strikethrough()">
                    <i class="bi bi-type-strikethrough"></i>
                </button>
                <button (click)="orderedList()">
                    <i class="bi bi-list-ol"></i>
                </button>
                <button (click)="unorderedList()">
                    <i class="bi bi-list-ul"></i>
                </button>
                <!--<button (click)="table()">
                    <i class="bi bi-table"></i>
                </button>-->
            </div>
            <div>
                <button (click)="saveNote()" class="save">{{ 'EDIT.SAVE_NOTE' | translate }}</button>
                <button (click)="exportNote()" class="export">{{ 'EDIT.EXPORT_NOTE' | translate }}</button>
            </div>
        </div>
        <div class="type-note">
            <textarea name="note" id="note" [value]="(entry$ | async)?.formattedNoteMD" (input)="addNote($event)" placeholder="{{ 'EDIT.NOTE' | translate }}" required></textarea>
        </div>
    </div>
</div>
