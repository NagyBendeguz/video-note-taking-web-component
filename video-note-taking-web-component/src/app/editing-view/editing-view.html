<div class="editing-view">
    <div class="data">
        <div class="thumbnail-div">
            <img [src]="(entry$ | async)?.thumbnail" [alt]="(entry$ | async)?.title" class="thumbnail">
        </div>
        <div class="time">
            <button (click)="editingRewind()" tabindex="-1">
                <i class="bi bi-chevron-double-left"></i>
            </button>
            <span>{{ (entry$ | async)?.timestamp }}</span>
            <button (click)="editingForward()" tabindex="-1">
                <i class="bi bi-chevron-double-right"></i>
            </button>
        </div>
        <div class="title">
            <label for="title">{{ 'edit.title' | translate }}</label>
            <input type="text" name="title" id="title" placeholder="{{ 'edit.title' | translate }}" [value]="(entry$ | async)?.title" (input)="addTitle($event)" maxlength="50" required tabindex="1" #inputTitle>
        </div>
        <div class="save-cancel">
            <button (click)="cancelEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="cancel" tabindex="-1">
                {{ 'actions.cancel' | translate }}
            </button>
            <button (click)="saveEntry()" [disabled]="(entry$ | async)?.title === '' && (entry$ | async)?.note === ''" class="save" tabindex="3">
                {{ 'actions.save' | translate }}
            </button>
            @if (showModal)
            {
                <confirm-message
                    [message]="'edit.confirmMessageYesCancel' | translate"
                    [type]="'edit.confirmMessageTypeCancel' | translate"
                    (confirm)="confirmCancel()"
                    (cancel)="cancelCancel()">
                </confirm-message>
            }
        </div>
    </div>
    <div class="note">
        <div class="edit-note">
            <div class="style-buttons">
                <button (click)="bold()" tabindex="-1">
                    <i class="bi bi-type-bold"></i>
                </button>
                <button (click)="italic()" tabindex="-1">
                    <i class="bi bi-type-italic"></i>
                </button>
                <button (click)="strikethrough()" tabindex="-1">
                    <i class="bi bi-type-strikethrough"></i>
                </button>
                <button (click)="orderedList()" tabindex="-1">
                    <i class="bi bi-list-ol"></i>
                </button>
                <button (click)="unorderedList()" tabindex="-1">
                    <i class="bi bi-list-ul"></i>
                </button>
                <!--<button (click)="table()" tabindex="-1">
                    <i class="bi bi-table"></i>
                </button>-->
            </div>
            <div>
                <button (click)="saveNote()" class="save" tabindex="-1">{{ 'edit.saveNote' | translate }}</button>
                <button (click)="exportNote()" class="export" tabindex="-1">{{ 'edit.exportNote' | translate }}</button>
            </div>
        </div>
        <div class="type-note">
            <textarea name="note" id="note" [value]="(entry$ | async)?.formattedNoteMD" (input)="addNote($event)" placeholder="{{ 'edit.note' | translate }}" required tabindex="2"></textarea>
        </div>
    </div>
</div>
