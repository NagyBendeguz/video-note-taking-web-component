@if (!isExtendedView) {
    <div class="compressed-view">
        <div class="thumbnail-div">
            <img [src]="entry.thumbnail" [alt]="entry.title" class="thumbnail">
        </div>
        <div class="data-div">
            <h4 [title]="entry.title">{{ entry.title }}</h4>
            <p (click)="jumpToTimestamp()" class="timestamp">
                {{ entry.timestamp }}
            </p>
        </div>
        <div class="note-div">
            <p class="note">{{ entry.note }}</p>
        </div>
        <button (click)="toggle()" class="down-button">
            <img src="chevron-down.svg" alt="Open Extended View" class="down">
        </button>
    </div>
}
@else {
    <extended-view-element
        [entry]="entry"
        [isExtendedView]="true"
        (onClose)="toggle()">
    </extended-view-element>
}
