@if (!isExtendedView)
{
    <div class="compressed-view">
        <div class="thumbnail-div">
            <img [src]="entry.thumbnail" [alt]="entry.title" class="thumbnail">
        </div>
        <div class="data-div">
            <h4 [title]="entry.title">{{ entry.title }}</h4>
            <p (click)="jumpToTimestamp()" class="timestamp">
                {{ entry.timestamp }}
            </p>
        </div>
        <div class="note-div">
            @if ((settings$ | async)!.convertInput)
            {
                <div class="note-html" [innerHTML]="entry.formattedNoteHTML"></div>
            }
            @else
            {
                <p class="note-raw" [innerHTML]="entry.noteWithBr"></p>
            }
        </div>
        <button (click)="toggle()" class="down-button">
            <i class="bi bi-chevron-down down"></i>
        </button>
    </div>
}
@else
{
    <extended-view
        [entry]="entry"
        [isExtendedView]="true"
        (onClose)="toggle()">
    </extended-view>
}
