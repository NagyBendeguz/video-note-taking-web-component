<div class="modal">
    <div class="modal-content">
        <h4>{{ 'confirmMessage.warning' | translate }}!</h4>
        <p>{{ 'confirmMessage.areYouSure' | translate }} {{ type }}{{ 'confirmMessage.it' | translate }}?</p>
        <div class="modal-footer">
            <button class="cancel" (click)="cancelButton()">{{ 'actions.cancel' | translate }}</button>
            <button class="delete" (click)="confirmButton()">{{ message }}</button>
        </div>
    </div>
</div>
