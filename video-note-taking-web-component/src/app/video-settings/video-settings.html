<div class="settings-div">
    <!--TODO: kinézet-->
    <h2>{{ 'settings.settings' | translate }}</h2>
    <h3>{{ 'settings.loadNote' | translate }}</h3>
    <ul>
        <li>
            <label>{{ 'settings.loadNote' | translate }}: </label>
            <input type="file" (change)="onFileChange($event)" accept=".json">
        </li>
    </ul>
    <h3>{{ 'settings.videoPlayerSettings' | translate }}</h3>
    <ul>
        <li>
            <label>{{ 'settings.playbackSpeed' | translate }}: </label>
            <select (change)="changePlaybackSpeed($event)">
                @for (speed of playbackSpeeds; track $index)
                {
                    <option [value]="speed" [selected]="speed === 1">{{speed}}x</option>
                }
            </select>
        </li>
        <li>
            <label>{{ 'settings.forwardRateInSeconds' | translate }}: </label>
            <input type="number" [value]="(videoForwardRate$ | async)" (input)="setVideoForwardRate($event)">
        </li>
        <li>
            <label>{{ 'settings.rewindRateInSeconds' | translate }}: </label>
            <input type="number" [value]="(videoRewindRate$ | async)" (input)="setVideoRewindRate($event)">
        </li>
        <li>
            <label>{{ 'settings.subtitles' | translate }}: </label>
            <button (click)="toggleSubtitles()">{{ isSubtitleVisible ? ('settings.turnOff' | translate) : ('settings.turnOn' | translate) }}</button>
        </li>
        <li>
            <label>{{ 'settings.videoNavbarOffset' | translate }}: </label>
            <button (click)="toggleOffset()" [disabled]="isFullscreen$ | async">{{ (isOffsetNegative$ | async) ? ('settings.turnOff' | translate) : ('settings.turnOn' | translate) }}</button>
        </li>
    </ul>
    <h3>{{ 'settings.editingSettings' | translate }}</h3>
    <ul>
        <li>
            <label>{{ 'settings.languages' | translate }}: </label>
            <select [value]="(settings$ | async)?.language" (change)="changeLang($event)">
                @for (lang of langs; track $index)
                {
                    <option [value]="lang.code">{{ lang.label }}</option>
                }
            </select>
        </li>
        <li>
            <label>{{ 'settings.theme' | translate }}: </label>
            <!--TODO-->
        </li>
        <li>
            <label>{{ 'settings.convertInput' | translate }}: </label>
            <button (click)="toggleConvertInput()">{{ (settings$ | async)?.convertInput ? ('settings.turnOff' | translate) : ('settings.turnOn' | translate) }}</button>
        </li>
        <li>
            <label>{{ 'settings.confirmCancel' | translate }}: </label>
            <button (click)="toggleConfirmCancel()">{{ (settings$ | async)?.confirmCancel ? ('settings.turnOff' | translate) : ('settings.turnOn' | translate) }}</button>
        </li>
        <li>
            <label>{{ 'settings.confirmDelete' | translate }}: </label>
            <button (click)="toggleConfirmDelete()">{{ (settings$ | async)?.confirmDelete ? ('settings.turnOff' | translate) : ('settings.turnOn' | translate) }}</button>
        </li>
        <li>
            <label>{{ 'settings.stopVideoOnNote' | translate }}: </label>
            <!--TODO-->
        </li>
        <li>
            <label>{{ 'settings.startVideoOnSave' | translate }}: </label>
            <!--TODO-->
        </li>
        <li>
            <label>{{ 'settings.thumbnail.qualityPercentage' | translate }}: </label>
            <input type="range" min="1" max="100" [value]="(settings$ | async)?.thumbnailQualityPercentage" (input)="setThumbnailQualityPercentage($event)"/>
        </li>
        <li>
            <label>{{ 'settings.thumbnail.width' | translate }}: </label>
            <input type="number" [value]="(settings$ | async)?.thumbnailWidth" (input)="setThumbnailWidth($event)">
        </li>
        <li>
            <label>{{ 'settings.thumbnail.height' | translate }}: </label>
            <input type="number" [value]="(settings$ | async)?.thumbnailHeight" (input)="setThumbnailHeight($event)">
        </li>
        <li>
            <label>{{ 'settings.thumbnail.forwardRateInSeconds' | translate }}: </label>
            <input type="number" [value]="(settings$ | async)?.thumbnailForwardRate" (input)="setThumbnailForwardRate($event)">
        </li>
        <li>
            <label>{{ 'settings.thumbnail.rewindRateInSeconds' | translate }}: </label>
            <input type="number" [value]="(settings$ | async)?.thumbnailRewindRate" (input)="setThumbnailRewindRate($event)">
        </li>
    </ul>
    <h3>{{ 'settings.shortcuts.shortcuts' | translate }}</h3>
    <ul>
        <li>
            <label>{{ 'edit.note' | translate }}: </label>
            <!--TODO-->
        </li>
        <li>
            <label>{{ 'settings.settings' | translate }}: </label>
            <!--TODO-->
        </li>

</div>
