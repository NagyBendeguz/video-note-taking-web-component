<div class="modal">
    <div class="modal-content">
        <h4>Warning!</h4>
        <p>Are you sure you want to delete it?</p>
        <div class="modal-footer">
            <button class="cancel" (click)="cancelDelete()">Cancel</button>
            <button class="delete" (click)="confirmDelete()">Delete</button>
        </div>
    </div>
</div>
